focus_lofi:
  label: "Lo-fi Focus"
  youtube_category_id: "10"
  primary_keywords:
    - "lofi beats for studying"
    - "study music"
    - "focus music"
    - "lofi hip hop mix"
    - "background music for work"
  title_phrases:
    - "Lo-fi Focus Mix"
    - "Deep Work Lo-fi Beats"
    - "Study With Me Instrumental Mix"
  music_prompt: >-
    Instrumental warm lo-fi hip hop for deep focus, no vocals, soft dusty drums,
    mellow jazz chords, subtle vinyl texture, rounded bass, calm and non-distracting,
    cohesive intro and outro, suitable for studying and coding.
  image_prompt: >-
    Cozy cyberpunk study room at night, rain on the window, warm desk lamp,
    plants, notebooks, headphones, cinematic 16:9, no logos, no readable brand names,
    calm premium YouTube music background.
  audience_value: "focus, studying, coding, writing and relaxed work sessions"
  tags:
    - lofi
    - lofi beats
    - study music
    - focus music
    - deep work
    - coding music
    - instrumental music
    - ai music

